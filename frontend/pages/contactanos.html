<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactanos</title>
    <link rel="stylesheet" href="../css/primary.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Nunito:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <!--
    <link href="https://googleapis.com" rel="stylesheet">  -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div id="mochiNav">
        <!-- Barra de navegación-->
    </div>
    <main>
        <!-- Descripcion contactanos  -->
        <section id="descripcionContacto">
            <div class="container text-center">
                <div class="row align-items-center">
                    <div class="col-12 col-md-6">
                        <p class="holaMochi text-center" >¡Hola, Mochi-Lover!</p>
                        <h1>¡Queremos escucharte!</h1>
                        <p>
                            ¿Tienes dudas sobre nuestros productos, pedidos especiales o simplemente
                            quieres compartirnos tu experiencia en MochiMexa? ¡Estamos a un clic de distancia!
                        </p>
                        <div class="botonesContacto" >
                            <button class="whats">
                                <img src="/frontend/assets/imagenes/contactanos/whatsIcon.png" alt="Icono de Whats">
                                WhatsApp
                            </button>
                            <button class="email">
                                <img src="/frontend/assets/imagenes/contactanos/emailIcon.png" alt="Icono de Email">
                                Enviar Email
                            </button>
                        </div>
                </div>
                <div class="col-12 col-md-6">
                    <img src="/frontend/assets/imagenes/contactanos/productos.jpeg" alt="Imagen de dangos" class="imagenProductos mt-4 mt-md-0">
                </div>
            </div>
        </section>



        <!-- Formulario -->
        <section id="formTeam">

        <div class="conteiner mt-5">

            <div class="row">
                <div class="col-sm-8 mx-auto">
                    <div class="card">
                        <div class="card-body">
                            <form>
                                <div class="mb-3">
                                    <label for="nombre" class="form-label">Nombre completo</label>
                                    <input type="text" class="form-control" id="nombre" required>
                                </div>
                                <div class="mb-3">
                                    <label for="correo" class="form-label">Correo electrónico</label>
                                    <input type="email" class="form-control" id="correo" placeholder="name@example.com" required>
                                </div>   
                                <div class="mb-3">
                                    <label for="mensaje" class="form-label">Escribe tu mensaje</label>
                                    <textarea class="form-control" id="mensaje" rows="4" required></textarea>
                                </div>
                                <button class="botonEnviar" type="submit">Enviar</button>
                                
                            </form>
                        </div>
                    </div>
                </div>
                
            </div>
        </div>
            
    
        </section>

    </main>

    <div id="mochiFooter"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
